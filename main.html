<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Personality Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    /* ─── Design Tokens ───────────────────────────────── */
    :root {
      --periwinkle:  #AFC2FF;   /* primary brand colour   */
      --periwinkle-light: #D8E4FF; /* hover / soft tint   */
      --periwinkle-dark:  #5070C8; /* active / accent     */
      --navy:        #1E2D6B;   /* headings & dark text   */
      --fog:         #EEF2FF;   /* option background      */
      --page-bg:     #F4F6FF;   /* body background        */
      --text-dark:   #1E2D6B;
      --text-mid:    #4A5899;
      --white-soft:  rgba(255, 255, 255, 0.65);
      --radius:      14px;
      --shadow:      0 4px 24px rgba(80, 112, 200, 0.12);
    }

    /* ─── Reset & Base ────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      background-color: var(--page-bg);
      background-image:
        radial-gradient(ellipse at 15% 10%, #d0dbff 0%, transparent 55%),
        radial-gradient(ellipse at 85% 90%, #c5d4ff55 0%, transparent 55%);
      min-height: 100vh;
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
    }

    /* ─── Card (shared shell) ─────────────────────────── */
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--white-soft);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(175, 194, 255, 0.45);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 24px;
      text-align: center;
    }

    /* ─── Utility ─────────────────────────────────────── */
    .hidden { display: none !important; }

    /* ─── Start Screen ────────────────────────────────── */
    #startScreen .welcome-img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    #startScreen h1 {
      font-size: 1.8rem;
      color: var(--navy);
      margin-bottom: 12px;
    }

    #startScreen p {
      color: var(--text-mid);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* ─── Primary Button ──────────────────────────────── */
    .btn-primary {
      background-color: var(--periwinkle-dark);
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      padding: 14px 36px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .btn-primary:hover  { background-color: var(--navy); }
    .btn-primary:active { transform: scale(0.97); }

    /* ─── Progress Bar ────────────────────────────────── */
    #progressWrap {
      width: 100%;
      max-width: 520px;
      margin-bottom: 16px;
    }

    .progress-track {
      height: 6px;
      background: var(--fog);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--periwinkle-dark);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-label {
      font-size: 0.78rem;
      color: var(--text-mid);
      text-align: right;
      margin-top: 4px;
      letter-spacing: 0.03em;
    }

    /* ─── Quiz Card ───────────────────────────────────── */
    #quizCard h2 {
      font-size: 1.15rem;
      color: var(--navy);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    /* ─── Option Labels (stacked vertically on mobile) ── */
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label.option {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--fog);
      border: 1.5px solid transparent;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
    }

    label.option:hover {
      background: var(--periwinkle-light);
      border-color: var(--periwinkle);
      transform: translateY(-1px);
    }

    label.option input[type="radio"] {
      display: none;
    }

    /* White-background PNGs: wrap in a tinted box so they blend in */
    label.option .img-wrap {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
      border-radius: 8px;
      background: var(--periwinkle-light);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    label.option img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 4px;
      /* blend white PNG backgrounds into the container */
      mix-blend-mode: multiply;
    }

    label.option .option-text {
      font-size: 0.92rem;
      color: var(--text-dark);
      line-height: 1.5;
      padding-top: 4px;
    }

    /* ─── Loading Screen ──────────────────────────────── */
    #loadingScreen p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--navy);
      margin-bottom: 20px;
    }

    /* White-bg shadow image on loading screen — same blend trick */
    #loadingScreen .img-wrap {
      width: 160px;
      height: 160px;
      margin: 0 auto 16px;
      border-radius: 12px;
      background: var(--periwinkle-light);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.5s ease-in-out infinite;
    }

    #loadingScreen img {
      width: 140px;
      height: 140px;
      object-fit: contain;
      mix-blend-mode: multiply;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(0.97); }
      50%       { opacity: 1;   transform: scale(1.03); }
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--periwinkle-light);
      border-top-color: var(--periwinkle-dark);
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Result Screen ───────────────────────────────── */
    #resultScreen h2 {
      font-size: 1.4rem;
      color: var(--navy);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    /* Wrap result image in a tinted box to hide white background */
    #resultScreen .img-wrap {
      width: 240px;
      height: 240px;
      border-radius: 16px;
      background: var(--periwinkle-light);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #resultScreen img {
      width: 220px;
      height: 220px;
      object-fit: contain;
      mix-blend-mode: multiply;
    }

    #resultScreen .fun-fact {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--text-mid);
      margin-bottom: 12px;
      line-height: 1.6;
    }

    #resultScreen .cta {
      font-size: 0.9rem;
      color: var(--text-dark);
      background: var(--fog);
      border-radius: 8px;
      padding: 12px 16px;
    }
  </style>
</head>

<body>

  <!-- ── Start Screen ─────────────────────────────────── -->
  <div id="startScreen" class="card">
    <img src="creatures.png" alt="Cafe creatures" class="welcome-img">
    <h1>What's Your Cafe Personality?</h1>
    <p>Every coffee order tells a story. Take a quick journey through our cosy corner and find out which cafe character you really are.</p>
    <button id="startBtn" class="btn-primary">Let's find out</button>
  </div>

  <!-- ── Progress Bar ─────────────────────────────────── -->
  <div id="progressWrap" class="hidden">
    <div class="progress-track">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <div id="progressLabel" class="progress-label">Question 1 of 4</div>
  </div>

  <!-- ── Quiz Card ────────────────────────────────────── -->
  <div id="quizCard" class="card hidden">
    <h2 id="questionText"></h2>
    <div class="options" id="optionsContainer"></div>
  </div>

  <!-- ── Loading Screen ───────────────────────────────── -->
  <div id="loadingScreen" class="card hidden">
    <p>One moment, something is brewing...</p>
    <div class="img-wrap">
      <img id="shadowImg" src="" alt="Mystery result">
    </div>
    <div class="spinner"></div>
  </div>

  <!-- ── Result Screen ─────────────────────────────────── -->
  <div id="resultScreen" class="card hidden">
    <h2 id="resultTitle"></h2>
    <div class="img-wrap">
      <img id="resultImg" src="" alt="Your result">
    </div>
    <p class="fun-fact" id="funFact"></p>
    <p class="cta">Show us your find at table E8 for a little treat.</p>
  </div>

  <!-- ── Audio ─────────────────────────────────────────── -->
  <audio id="nextSound"   src="bubble.mp3"  preload="auto"></audio>
  <audio id="finishSound" src="finish.mp3"  preload="auto"></audio>

  <!-- ── Confetti ───────────────────────────────────────── -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    /* ═══════════════════════════════════════════════════
       QUIZ DATA
    ═══════════════════════════════════════════════════ */

    const questions = [
      {
        text: "To begin your journey, would you like to explore the coral reef — or head towards the shipwreck?",
        name: "q1",
        options: [
          { value: "coral",     img: "q1-option1 - coral reef.png", label: "Through the coral reef — who knows what colourful surprises are hiding in there." },
          { value: "shipwreck", img: "q1-option2 - shipwreck.png",  label: "That shipwreck looks interesting. Let's see what mysteries we can uncover." }
        ]
      },
      {
        text: "A smack of jellyfish and a school of fish glide past, inviting you along. Who do you swim with?",
        name: "q2",
        options: [
          { value: "jellyfish", img: "q2-option1 - jellyfish.png", label: "Head north with the jellyfish." },
          { value: "fish",      img: "q2-option2 - fish.png",      label: "Swim south with the school of fish." }
        ]
      },
      {
        text: "Your new friends lead you to a crossroads. The seaweed forest or the towering seamount?",
        name: "q3",
        options: [
          { value: "seaweed",  img: "q3-option1 - seaweed.png", label: "Into the seaweed forest — a little lost never hurt anyone." },
          { value: "seamount", img: "q3-option2 - seamount.png", label: "Around the seamount for the view." }
        ]
      },
      {
        text: "The landscape grows darker and more rocky. Where do you explore first?",
        name: "q4",
        options: [
          { value: "cave",  img: "q4-option1 - cave.png",  label: "That cave is hiding something — let's find it." },
          { value: "ridge", img: "q4-option2 - ridge.png", label: "The ocean ridge is calling my name." }
        ]
      }
    ];

    const results = [
      {
        shadow: "angelfish1.png",
        img:    "angelfish.png",
        title:  "You discovered a Peppermint Angelfish!",
        fact:   "Named for its vibrant red, orange and white stripes — just like a peppermint candy. A rare, festive creature of the deep."
      },
      {
        shadow: "crab1.png",
        img:    "crab.png",
        title:  "You discovered a Raspberry Crab!",
        fact:   "Small, bright and charming. Their reddish-purple hue with hints of orange makes them look like tiny ocean berries."
      },
      {
        shadow: "eel1.png",
        img:    "eel.png",
        title:  "You discovered a Garden Eel!",
        fact:   "They live in large colonies that sway gently like a garden in the current — heads up, bodies buried in the sandy floor."
      },
      {
        shadow: "octo1.png",
        img:    "octo.png",
        title:  "You discovered a Flapjack Octopus!",
        fact:   "Its flat, pancake-like body isn't just adorable — it helps this little creature glide across the ocean floor and blend right in."
      }
    ];


    /* ═══════════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════════ */

    let currentIndex = 0;
    const totalQuestions = questions.length;


    /* ═══════════════════════════════════════════════════
       ELEMENT REFS
    ═══════════════════════════════════════════════════ */

    const startScreen   = document.getElementById('startScreen');
    const progressWrap  = document.getElementById('progressWrap');
    const progressFill  = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const quizCard      = document.getElementById('quizCard');
    const questionText  = document.getElementById('questionText');
    const optionsCont   = document.getElementById('optionsContainer');
    const loadingScreen = document.getElementById('loadingScreen');
    const shadowImg     = document.getElementById('shadowImg');
    const resultScreen  = document.getElementById('resultScreen');
    const resultTitle   = document.getElementById('resultTitle');
    const resultImg     = document.getElementById('resultImg');
    const funFact       = document.getElementById('funFact');
    const nextSound     = document.getElementById('nextSound');
    const finishSound   = document.getElementById('finishSound');
    const startBtn      = document.getElementById('startBtn');


    /* ═══════════════════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════════════════ */

    function show(el)  { el.classList.remove('hidden'); }
    function hide(el)  { el.classList.add('hidden'); }

    function updateProgress(questionNumber) {
      const percent = Math.round((questionNumber / totalQuestions) * 100);
      progressFill.style.width = percent + '%';
      progressLabel.textContent = `Question ${questionNumber} of ${totalQuestions}`;
    }


    /* ═══════════════════════════════════════════════════
       RENDER A QUESTION
    ═══════════════════════════════════════════════════ */

    function renderQuestion(index) {
      const q = questions[index];
      questionText.textContent = q.text;
      optionsCont.innerHTML = '';

      q.options.forEach(opt => {
        const label = document.createElement('label');
        label.className = 'option';

        label.innerHTML = `
          <input type="radio" name="${q.name}" value="${opt.value}">
          <div class="img-wrap"><img src="${opt.img}" alt="${opt.label}"></div>
          <span class="option-text">${opt.label}</span>
        `;

        label.querySelector('input').addEventListener('change', onOptionSelected);
        optionsCont.appendChild(label);
      });

      updateProgress(index + 1);
    }


    /* ═══════════════════════════════════════════════════
       HANDLE OPTION CLICK
    ═══════════════════════════════════════════════════ */

    function onOptionSelected() {
      nextSound.currentTime = 0;
      nextSound.play();

      const isLastQuestion = currentIndex === totalQuestions - 1;

      if (isLastQuestion) {
        showLoading();
      } else {
        currentIndex++;
        renderQuestion(currentIndex);
      }
    }


    /* ═══════════════════════════════════════════════════
       LOADING → RESULT
    ═══════════════════════════════════════════════════ */

    function showLoading() {
      hide(quizCard);
      hide(progressWrap);

      const chosen = results[Math.floor(Math.random() * results.length)];

      // Pre-load result data
      shadowImg.src    = chosen.shadow;
      resultImg.src    = chosen.img;
      resultTitle.textContent = chosen.title;
      funFact.textContent     = chosen.fact;

      show(loadingScreen);

      setTimeout(() => {
        hide(loadingScreen);
        finishSound.play();
        show(resultScreen);

        confetti({
          particleCount: 80,
          spread: 70,
          colors: ['#AFC2FF', '#5070C8', '#1E2D6B', '#D8E4FF', '#ffffff']
        });
      }, 4000);
    }


    /* ═══════════════════════════════════════════════════
       START
    ═══════════════════════════════════════════════════ */

    startBtn.addEventListener('click', () => {
      hide(startScreen);
      show(progressWrap);
      show(quizCard);
      renderQuestion(currentIndex);
    });

  </script>
</body>
</html>
