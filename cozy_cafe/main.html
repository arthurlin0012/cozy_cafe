<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cafe Ginkgo</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --periwinkle:  #AFC2FF;
      --periwinkle-light: #D8E4FF;
      --periwinkle-dark:  #5070C8;
      --navy:        #1E2D6B;
      --fog:         #EEF2FF;
      --page-bg:     #F4F6FF;
      --text-dark:   #1E2D6B;
      --text-mid:    #4A5899;
      --white-soft:  rgba(255, 255, 255, 0.65);
      --radius:      14px;
      --shadow:      0 4px 24px rgba(80, 112, 200, 0.12);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      font-weight: 400;
      background-color: var(--page-bg);
      background-image:
        radial-gradient(ellipse at 15% 10%, #d0dbff 0%, transparent 55%),
        radial-gradient(ellipse at 85% 90%, #c5d4ff55 0%, transparent 55%);
      min-height: 100vh;
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 48px;
    }

    h1, h2, h3 { font-family: 'Playfair Display', serif; }

    .card {
      width: 100%;
      max-width: 520px;
      background: var(--white-soft);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(175, 194, 255, 0.45);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 32px 24px;
      text-align: center;
    }

    .hidden { display: none !important; }

    /* ─── Start Screen ── */
    #startScreen .welcome-img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    #startScreen h1 {
      font-size: 1.8rem;
      color: var(--navy);
      margin-bottom: 12px;
    }

    #startScreen p {
      color: var(--text-mid);
      line-height: 1.6;
      margin-bottom: 24px;
    }

    /* ─── Primary Button ── */
    .btn-primary {
      background-color: var(--periwinkle-dark);
      color: #fff;
      font-family: 'Lato', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      padding: 14px 36px;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
    }

    .btn-primary:hover  { background-color: var(--navy); }
    .btn-primary:active { transform: scale(0.97); }

    /* ─── Progress Bar ── */
    #progressWrap {
      width: 100%;
      max-width: 520px;
      margin-bottom: 16px;
    }

    .progress-track {
      height: 6px;
      background: var(--fog);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--periwinkle-dark);
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    .progress-label {
      font-size: 0.78rem;
      color: var(--text-mid);
      text-align: right;
      margin-top: 4px;
      letter-spacing: 0.03em;
    }

    /* ─── Quiz Card ── */
    #quizCard h2 {
      font-size: 1.15rem;
      color: var(--navy);
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    label.option {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: var(--fog);
      border: 1.5px solid transparent;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      text-align: left;
      transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
    }

    label.option:hover {
      background: var(--periwinkle-light);
      border-color: var(--periwinkle);
      transform: translateY(-1px);
    }

    label.option input[type="radio"] { display: none; }

    label.option .img-wrap {
      width: 80px;
      height: 80px;
      flex-shrink: 0;
      border-radius: 8px;
      background: var(--periwinkle-light);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    label.option img {
      width: 72px;
      height: 72px;
      object-fit: contain;
      border-radius: 4px;
    }

    label.option .option-text {
      font-size: 0.92rem;
      color: var(--text-dark);
      line-height: 1.5;
      padding-top: 4px;
    }

    /* ─── Loading Screen ── */
    #loadingScreen p {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: var(--navy);
      margin-bottom: 20px;
    }

    #loadingScreen .img-wrap {
      width: 160px;
      height: 160px;
      margin: 0 auto 16px;
      border-radius: 12px;
      background: var(--periwinkle-light);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse 1.5s ease-in-out infinite;
    }

    #loadingScreen img {
      width: 140px;
      height: 140px;
      object-fit: contain;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(0.97); }
      50%       { opacity: 1;   transform: scale(1.03); }
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--periwinkle-light);
      border-top-color: var(--periwinkle-dark);
      border-radius: 50%;
      margin: 0 auto;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Result Screen ── */
    #resultScreen h2 {
      font-size: 1.4rem;
      color: var(--navy);
      margin-bottom: 16px;
      line-height: 1.4;
    }

    #resultScreen .img-wrap {
      width: 240px;
      height: 240px;
      border-radius: 16px;
      background: var(--periwinkle-light);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #resultScreen img {
      width: 220px;
      height: 220px;
      object-fit: contain;
    }

    #resultScreen .fun-fact {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1rem;
      color: var(--text-mid);
      margin-bottom: 12px;
      line-height: 1.6;
    }

    #resultScreen .cta {
      font-size: 0.9rem;
      color: var(--text-dark);
      background: var(--fog);
      border-radius: 8px;
      padding: 12px 16px;
    }
  </style>
</head>

<body>

  <!-- ── Start Screen ── -->
  <div id="startScreen" class="card">
    <img src="front.png" alt="Welcome to Cafe Ginkgo" class="welcome-img">
    <h1>Welcome to Cafe Ginkgo!</h1>
    <p>Step inside to enjoy a cosy escape...</p>
    <button id="startBtn" class="btn-primary">Enter</button>
  </div>

  <!-- ── Progress Bar ── -->
  <div id="progressWrap" class="hidden">
    <div class="progress-track">
      <div id="progressFill" class="progress-fill"></div>
    </div>
    <div id="progressLabel" class="progress-label">Question 1 of 4</div>
  </div>

  <!-- ── Quiz Card ── -->
  <div id="quizCard" class="card hidden">
    <h2 id="questionText"></h2>
    <div class="options" id="optionsContainer"></div>
  </div>

  <!-- ── Loading Screen ── -->
  <div id="loadingScreen" class="card hidden">
    <p>Lost in your own little world, you glance up as the waitress brings over your treat…</p>
    <div class="img-wrap">
      <img id="shadowImg" src="" alt="Your treat is on its way">
    </div>
    <div class="spinner"></div>
  </div>

  <!-- ── Result Screen ── -->
  <div id="resultScreen" class="card hidden">
    <h2 id="resultTitle"></h2>
    <div class="img-wrap">
      <img id="resultImg" src="" alt="Your result">
    </div>
    <p class="cta" id="resultCta"></p>
  </div>

  <audio id="nextSound"   src="coffee_drop.mp3"  preload="auto"></audio>
  <audio id="finishSound" src="coffee_finish.mp3"  preload="auto"></audio>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

  <script>
    /* ═══════════════════════════════════════════════════
       QUIZ DATA
    ═══════════════════════════════════════════════════ */

    const questions = [
      {
        text: "Where would you like to sit?",
        name: "q1",
        options: [
          { value: "window", img: "Q1 - 1.png", label: "By the window, where I can watch the world go by!" },
          { value: "sofa",   img: "Q1 - 2.png", label: "On the sofa next to the cat. I promise not to wake it up!" }
        ]
      },
      {
        text: "You take a look at the menu and two drinks catch your eye. What will you be having?",
        name: "q2",
        options: [
          { value: "matcha", img: "Q2 - 1.png", label: "A matcha latte — smooth and creamy." },
          { value: "sakura", img: "Q2 - 2.png", label: "A sakura tea — sweet and fragrant." }
        ]
      },
      {
        text: "While browsing the rest of the menu, you start to feel a little peckish... Are you in the mood for something sweet or savoury?",
        name: "q3",
        options: [
          { value: "savoury", img: "Q3 - 1.png", label: "Something savoury and filling!" },
          { value: "sweet",   img: "Q3 - 2.png", label: "Something sweet and refreshing!" }
        ]
      },
      {
        text: "After placing your order, you settle down at your table with your warm beverage. How will you spend your cosy afternoon at the cafe?",
        name: "q4",
        options: [
          { value: "book",   img: "Q4 - 1.png", label: "I've brought along this book I've been reading — perfect for a little relaxing escape!" },
          { value: "laptop", img: "Q4 - 2.png", label: "I've brought my laptop, ready to tackle some work!" }
        ]
      }
    ];

    /*
      Result logic based on Q3 answer (savoury → answers 1 or 2, sweet → answers 3 or 4)
      combined with Q4 answer (book → odd result, laptop → even result)

      savoury + book   → answer 1 (tempura bento)
      savoury + laptop → answer 2 (omelette bento)
      sweet   + book   → answer 3 (caramel pudding)
      sweet   + laptop → answer 4 (melon soda)
    */

    const results = {
      "savoury-book":   { img: "answer 1.png", title: "Your tempura bento has arrived!",    cta: "Come over to table 56 to enjoy this tasty treat!" },
      "savoury-laptop": { img: "answer 2.png", title: "Your omelette bento has arrived!",   cta: "Come over to table 56 to enjoy this tasty treat!" },
      "sweet-book":     { img: "answer 3.png", title: "Your caramel pudding has arrived!",  cta: "Come over to table 56 to enjoy this tasty treat!" },
      "sweet-laptop":   { img: "answer 4.png", title: "Your melon soda has arrived!",       cta: "Come over to table 56 to enjoy this tasty treat!" }
    };

    /* ═══════════════════════════════════════════════════
       STATE
    ═══════════════════════════════════════════════════ */

    let currentIndex = 0;
    const totalQuestions = questions.length;
    const answers = {};   // stores { q1: value, q2: value, ... }

    /* ═══════════════════════════════════════════════════
       ELEMENT REFS
    ═══════════════════════════════════════════════════ */

    const startScreen   = document.getElementById('startScreen');
    const progressWrap  = document.getElementById('progressWrap');
    const progressFill  = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    const quizCard      = document.getElementById('quizCard');
    const questionText  = document.getElementById('questionText');
    const optionsCont   = document.getElementById('optionsContainer');
    const loadingScreen = document.getElementById('loadingScreen');
    const shadowImg     = document.getElementById('shadowImg');
    const resultScreen  = document.getElementById('resultScreen');
    const resultTitle   = document.getElementById('resultTitle');
    const resultImg     = document.getElementById('resultImg');
    const resultCta     = document.getElementById('resultCta');
    const nextSound     = document.getElementById('nextSound');
    const finishSound   = document.getElementById('finishSound');
    const startBtn      = document.getElementById('startBtn');

    /* ═══════════════════════════════════════════════════
       HELPERS
    ═══════════════════════════════════════════════════ */

    function show(el) { el.classList.remove('hidden'); }
    function hide(el) { el.classList.add('hidden'); }

    function updateProgress(questionNumber) {
      const percent = Math.round((questionNumber / totalQuestions) * 100);
      progressFill.style.width = percent + '%';
      progressLabel.textContent = `Question ${questionNumber} of ${totalQuestions}`;
    }

    /* ═══════════════════════════════════════════════════
       RENDER A QUESTION
    ═══════════════════════════════════════════════════ */

    function renderQuestion(index) {
      const q = questions[index];
      questionText.textContent = q.text;
      optionsCont.innerHTML = '';

      q.options.forEach(opt => {
        const label = document.createElement('label');
        label.className = 'option';
        label.innerHTML = `
          <input type="radio" name="${q.name}" value="${opt.value}">
          <div class="img-wrap"><img src="${opt.img}" alt="${opt.label}"></div>
          <span class="option-text">${opt.label}</span>
        `;
        label.querySelector('input').addEventListener('change', () => onOptionSelected(q.name, opt.value));
        optionsCont.appendChild(label);
      });

      updateProgress(index + 1);
    }

    /* ═══════════════════════════════════════════════════
       HANDLE OPTION CLICK
    ═══════════════════════════════════════════════════ */

    function onOptionSelected(questionName, value) {
      answers[questionName] = value;

      nextSound.currentTime = 0;
      nextSound.play();

      const isLastQuestion = currentIndex === totalQuestions - 1;
      if (isLastQuestion) {
        showLoading();
      } else {
        currentIndex++;
        renderQuestion(currentIndex);
      }
    }

    /* ═══════════════════════════════════════════════════
       DETERMINE RESULT
    ═══════════════════════════════════════════════════ */

    function getResult() {
      const taste = answers['q3'];   // 'savoury' or 'sweet'
      const vibe  = answers['q4'];   // 'book' or 'laptop'
      const key   = `${taste}-${vibe}`;
      return results[key] || results['savoury-book']; // fallback
    }

    /* ═══════════════════════════════════════════════════
       LOADING → RESULT
    ═══════════════════════════════════════════════════ */

    function showLoading() {
      hide(quizCard);
      hide(progressWrap);

      const chosen = getResult();

      // Pre-load result image
      shadowImg.src = chosen.img;
      resultImg.src = chosen.img;
      resultTitle.textContent = chosen.title;
      resultCta.textContent   = chosen.cta;

      show(loadingScreen);

      setTimeout(() => {
        hide(loadingScreen);
        finishSound.play();
        show(resultScreen);

        confetti({
          particleCount: 80,
          spread: 70,
          colors: ['#AFC2FF', '#5070C8', '#1E2D6B', '#D8E4FF', '#ffffff']
        });
      }, 4000);
    }

    /* ═══════════════════════════════════════════════════
       START
    ═══════════════════════════════════════════════════ */

    startBtn.addEventListener('click', () => {
      hide(startScreen);
      show(progressWrap);
      show(quizCard);
      renderQuestion(currentIndex);
    });
  </script>
</body>
</html>
